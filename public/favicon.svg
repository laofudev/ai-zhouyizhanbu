<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景 -->
  <circle cx="50" cy="50" r="48" fill="#C0392B"/>

  <!-- 外圈金色边框 -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#D4AF37" stroke-width="3"/>

  <!-- 太极图案 -->
  <g transform="translate(50, 50)">
    <!-- 阳鱼（左上） -->
    <path d="M 0,-40 A 40,40 0 0,1 0,40 A 20,20 0 0,1 0,0 A 20,20 0 0,0 0,-40 Z" fill="#2C3E50"/>

    <!-- 阴鱼（右下） -->
    <path d="M 0,-40 A 40,40 0 0,0 0,40 A 20,20 0 0,0 0,0 A 20,20 0 0,1 0,-40 Z" fill="#F5F5DC"/>

    <!-- 阳中阴点 -->
    <circle cx="0" cy="-20" r="6" fill="#F5F5DC"/>

    <!-- 阴中阳点 -->
    <circle cx="0" cy="20" r="6" fill="#2C3E50"/>
  </g>

  <!-- 八卦符号简化 -->
  <g stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.3">
    <!-- 乾卦（上） -->
    <line x1="45" y1="3" x2="55" y2="3"/>
    <line x1="45" y1="7" x2="55" y2="7"/>
    <line x1="45" y1="11" x2="55" y2="11"/>

    <!-- 坤卦（下） -->
    <line x1="45" y1="86" x2="49" y2="86"/>
    <line x1="51" y1="86" x2="55" y2="86"/>
    <line x1="45" y1="90" x2="49" y2="90"/>
    <line x1="51" y1="90" x2="55" y2="90"/>
    <line x1="45" y1="94" x2="49" y2="94"/>
    <line x1="51" y1="94" x2="55" y2="94"/>
  </g>
</svg>
